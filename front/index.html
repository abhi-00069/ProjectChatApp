



<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Chat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=gg+Sans:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    
    :root {
      --bg-primary:    #1e1f22;
      --bg-secondary:  #2b2d31;
      --bg-tertiary:   #313338;
      --bg-hover:      #35373c;
      --bg-active:     #404249;
      --bg-input:      #1e1f22;
      --accent:        #5865f2;
      --accent-hover:  #4752c4;
      --accent-green:  #57f287;
      --accent-red:    #ed4245;
      --accent-yellow: #fee75c;
      --text-primary:  #f2f3f5;
      --text-secondary:#b5bac1;
      --text-muted:    #80848e;
      --border:        #1e1f22;
      --shadow:        rgba(0,0,0,0.4);
      --online:        #23a55a;
      --offline:       #80848e;
      --radius:        8px;
      --sidebar-w:     240px;
      --server-w:      72px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
    }

 
    #auth-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: var(--bg-primary);
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(88,101,242,0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(87,242,135,0.08) 0%, transparent 50%);
    }

    .auth-box {
      background: var(--bg-secondary);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .auth-logo .logo-icon {
      width: 64px;
      height: 64px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      font-size: 28px;
      box-shadow: 0 8px 24px rgba(88,101,242,0.4);
    }

    .auth-logo h1 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }

    .auth-logo p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .auth-tabs {
      display: flex;
      background: var(--bg-tertiary);
      border-radius: var(--radius);
      padding: 4px;
      margin-bottom: 24px;
    }

    .auth-tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      transition: all 0.2s;
    }

    .auth-tab.active {
      background: var(--accent);
      color: #fff;
    }

    .auth-form { display: none; flex-direction: column; gap: 14px; }
    .auth-form.active { display: flex; }

    .form-group { display: flex; flex-direction: column; gap: 6px; }

    .form-group label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .form-group input {
      background: var(--bg-input);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      padding: 10px 14px;
      color: var(--text-primary);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(88,101,242,0.2);
    }

    .auth-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 4px;
      font-family: inherit;
    }

    .auth-btn:hover  { background: var(--accent-hover); }
    .auth-btn:active { transform: scale(0.98); }

    .auth-error {
      background: rgba(237,66,69,0.15);
      border: 1px solid rgba(237,66,69,0.4);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 13px;
      color: var(--accent-red);
      display: none;
    }

    
    #app-screen { display: none; height: 100vh; }

    .app-layout {
      display: flex;
      height: 100vh;
    }

    
    .server-rail {
      width: var(--server-w);
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      gap: 8px;
      overflow-y: auto;
      border-right: 1px solid rgba(255,255,255,0.04);
    }

    .server-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 20px;
      transition: all 0.2s;
      position: relative;
    }

    .server-icon:hover, .server-icon.active {
      border-radius: 16px;
      background: var(--accent);
    }

    .server-icon::before {
      content: '';
      position: absolute;
      left: -12px;
      width: 4px;
      height: 0;
      background: var(--text-primary);
      border-radius: 0 4px 4px 0;
      transition: height 0.2s;
    }

    .server-icon.active::before { height: 40px; }
    .server-icon:hover::before  { height: 20px; }

    .server-divider {
      width: 32px;
      height: 2px;
      background: var(--bg-secondary);
      border-radius: 2px;
    }

   
    .sidebar {
      width: var(--sidebar-w);
      background: var(--bg-secondary);
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: background 0.15s;
    }

    .sidebar-header:hover { background: var(--bg-hover); }

    .sidebar-header h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.2px;
    }

    .sidebar-search {
      padding: 8px 8px 4px;
    }

    .search-input {
      width: 100%;
      background: var(--bg-input);
      border: none;
      border-radius: var(--radius);
      padding: 6px 10px;
      color: var(--text-primary);
      font-size: 13px;
      font-family: inherit;
      outline: none;
    }

    .search-input::placeholder { color: var(--text-muted); }

    .sidebar-section-label {
      padding: 16px 8px 4px 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-section-label button {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      transition: color 0.15s;
      padding: 0 4px;
    }

    .sidebar-section-label button:hover { color: var(--text-primary); }

    .user-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px 8px;
    }

    .user-list::-webkit-scrollbar { width: 4px; }
    .user-list::-webkit-scrollbar-track { background: transparent; }
    .user-list::-webkit-scrollbar-thumb { background: var(--bg-active); border-radius: 4px; }

    .user-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 8px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }

    .user-item:hover   { background: var(--bg-hover); }
    .user-item.active  { background: var(--bg-active); }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
      color: #fff;
      flex-shrink: 0;
      position: relative;
    }

    .avatar .status-dot {
      position: absolute;
      bottom: -1px;
      right: -1px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid var(--bg-secondary);
    }

    .status-dot.online  { background: var(--online); }
    .status-dot.offline { background: var(--offline); }

    .user-info { flex: 1; min-width: 0; }

    .user-info .name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-item.active .name,
    .user-item:hover .name { color: var(--text-primary); }

    .user-info .last-msg {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .unread-badge {
      background: var(--accent-red);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 10px;
      min-width: 18px;
      text-align: center;
    }

    
    .user-panel {
      padding: 8px;
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user-panel .avatar { width: 32px; height: 32px; font-size: 13px; cursor: pointer; }

    .user-panel-info { flex: 1; min-width: 0; }
    .user-panel-info .uname { font-size: 13px; font-weight: 700; color: var(--text-primary); }
    .user-panel-info .ustatus { font-size: 11px; color: var(--online); }

    .panel-actions { display: flex; gap: 4px; }
    .panel-btn {
      width: 32px; height: 32px;
      border: none; border-radius: var(--radius);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .panel-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

   
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-tertiary);
      overflow: hidden;
    }

    
    .chat-header {
      height: 48px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(0,0,0,0.3);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      flex-shrink: 0;
    }

    .chat-header .header-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px; color: #fff;
    }

    .chat-header-info { flex: 1; }
    .chat-header-info .title { font-size: 15px; font-weight: 700; color: var(--text-primary); }
    .chat-header-info .subtitle { font-size: 12px; color: var(--text-muted); }

    .header-actions { display: flex; gap: 4px; }
    .header-btn {
      width: 36px; height: 36px;
      border: none; border-radius: var(--radius);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .header-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

    
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--bg-active); border-radius: 4px; }

    
    .welcome-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      color: var(--text-muted);
    }

    .welcome-screen .big-icon {
      font-size: 80px;
      filter: grayscale(0.3);
    }

    .welcome-screen h2 {
      font-size: 24px;
      color: var(--text-secondary);
      font-weight: 700;
    }

    .welcome-screen p { font-size: 14px; }

    
    .msg-group {
      display: flex;
      flex-direction: column;
      margin-top: 16px;
    }

    .msg-group-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 4px;
    }

    .msg-group-header .avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      align-self: flex-start;
      font-size: 16px;
    }

    .msg-group-header .sender-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .msg-group-header .msg-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-left: 4px;
    }

    .msg-group-body { margin-left: 52px; }

    .message {
      padding: 2px 0;
      border-radius: 4px;
      font-size: 15px;
      color: var(--text-primary);
      line-height: 1.5;
      position: relative;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      transition: background 0.1s;
    }

    .message:hover { background: rgba(0,0,0,0.1); }

    .message .msg-text { flex: 1; }

    .message .msg-actions {
      display: none;
      position: absolute;
      right: 8px;
      top: -18px;
      background: var(--bg-secondary);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      padding: 4px;
      gap: 2px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      flex-direction: row;
      z-index: 10;
    }

    .message:hover .msg-actions { display: flex; }

    .msg-action-btn {
      width: 28px; height: 28px;
      border: none; border-radius: 4px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .msg-action-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .msg-action-btn.delete:hover { background: rgba(237,66,69,0.2); color: var(--accent-red); }

    
    .msg-group.own .msg-group-header { flex-direction: row-reverse; }
    .msg-group.own .msg-group-body   { margin-left: 0; margin-right: 52px; text-align: right; }
    .msg-group.own .msg-text         { color: #dcddde; }

    
    .msg-image {
      max-width: 320px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .msg-image:hover { opacity: 0.9; }

    
    .msg-file {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg-secondary);
      border-radius: var(--radius);
      padding: 10px 14px;
      max-width: 280px;
      text-decoration: none;
      color: var(--text-primary);
      border: 1px solid rgba(255,255,255,0.06);
      transition: background 0.15s;
    }
    .msg-file:hover { background: var(--bg-hover); }
    .msg-file .file-icon { font-size: 24px; }
    .msg-file .file-name { font-size: 13px; font-weight: 500; }
    .msg-file .file-size { font-size: 11px; color: var(--text-muted); }

    
    .date-sep {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
    }
    .date-sep::before, .date-sep::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.06);
    }

    
    .typing-bar {
      height: 24px;
      padding: 0 16px;
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .typing-dots span {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-4px); }
    }

   
    .chat-input-area {
      padding: 0 16px 16px;
      flex-shrink: 0;
    }

    .input-box {
      display: flex;
      align-items: center;
      background: var(--bg-input);
      border-radius: 12px;
      padding: 0 8px;
      gap: 4px;
      border: 1px solid rgba(255,255,255,0.06);
      transition: border-color 0.2s;
    }

    .input-box:focus-within { border-color: rgba(88,101,242,0.4); }

    .input-btn {
      width: 36px; height: 36px;
      border: none; border-radius: var(--radius);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .input-btn:hover { color: var(--text-primary); background: var(--bg-hover); }

    #msg-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-size: 15px;
      font-family: inherit;
      padding: 10px 0;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
    }

    #msg-input::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 36px; height: 36px;
      border: none; border-radius: var(--radius);
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .send-btn:hover  { background: var(--accent-hover); }
    .send-btn:active { transform: scale(0.92); }

    
    .members-panel {
      width: 240px;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      padding: 16px 8px;
      display: none;
      overflow-y: auto;
    }

    .members-panel.open { display: block; }

    .members-panel h4 {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 8px;
      margin-bottom: 8px;
    }

    
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--bg-secondary);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 12px 18px;
      font-size: 14px;
      color: var(--text-primary);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      z-index: 9999;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: 320px;
    }

    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-left: 3px solid var(--accent-green); }
    .toast.error   { border-left: 3px solid var(--accent-red); }
    .toast.info    { border-left: 3px solid var(--accent); }

    
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      display: none;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg-secondary);
      border-radius: 16px;
      padding: 32px;
      width: 440px;
      max-width: 90vw;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }

    .modal h3 { font-size: 20px; font-weight: 700; margin-bottom: 20px; }

    
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg-active); border-radius: 4px; }

    
    .no-chat {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; color: var(--text-muted);
    }

    .no-chat .nc-icon { font-size: 72px; }
    .no-chat h2 { font-size: 20px; font-weight: 700; color: var(--text-secondary); }
    .no-chat p  { font-size: 14px; text-align: center; max-width: 280px; line-height: 1.6; }

    
    @media (max-width: 768px) {
      .server-rail { display: none; }
      .sidebar { width: 200px; }
      .members-panel { display: none !important; }
    }

    @media (max-width: 480px) {
      .sidebar { width: 100%; position: absolute; z-index: 100; }
      .sidebar.mobile-hide { display: none; }
    }
  </style>
</head>
<body>


<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="logo-icon">💬</div>
      <h1>Nexus Chat</h1>
      <p>Connect. Communicate. Collaborate.</p>
    </div>

    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">Sign In</div>
      <div class="auth-tab" onclick="switchTab('register')">Create Account</div>
    </div>

    <div id="auth-error" class="auth-error"></div>

   
    <form class="auth-form active" id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="login-username" placeholder="Enter your username" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="auth-btn">Sign In</button>
    </form>

    
    <form class="auth-form" id="register-form" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="Choose a username" required />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="Enter your email" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Create a password (min 6 chars)" required />
      </div>
      <button type="submit" class="auth-btn">Create Account</button>
    </form>
  </div>
</div>


<div id="app-screen">
  <div class="app-layout">

    <!-- Server Rail -->
    <div class="server-rail">
      <div class="server-icon active" title="Direct Messages">💬</div>
      <div class="server-divider"></div>
      <div class="server-icon" title="Create Group" onclick="openGroupModal()">➕</div>
    </div>

    
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h3>Direct Messages</h3>
        <i class="fas fa-ellipsis-h" style="color:var(--text-muted);font-size:14px;"></i>
      </div>

      <div class="sidebar-search">
        <input class="search-input" type="text" placeholder="🔍 Find a conversation" id="search-input" oninput="filterUsers()" />
      </div>

      <div class="sidebar-section-label">
        <span>Online — <span id="online-count">0</span></span>
        <button onclick="openGroupModal()" title="New Group"><i class="fas fa-plus"></i></button>
      </div>

      <div class="user-list" id="user-list"></div>

      <div class="user-panel" id="user-panel">
        <div class="avatar" id="my-avatar" style="background:#5865f2;">?</div>
        <div class="user-panel-info">
          <div class="uname" id="my-username">—</div>
          <div class="ustatus">● Online</div>
        </div>
        <div class="panel-actions">
          <button class="panel-btn" title="Settings" onclick="showToast('Settings coming soon!','info')"><i class="fas fa-cog"></i></button>
          <button class="panel-btn" title="Logout" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i></button>
        </div>
      </div>
    </div>

    
    <div class="chat-area" id="chat-area">
      <div class="no-chat">
        <div class="nc-icon">💬</div>
        <h2>Welcome to Nexus Chat</h2>
        <p>Select a user from the sidebar to start chatting in real-time!</p>
      </div>
    </div>

    <!-- Members Panel -->
    <div class="members-panel" id="members-panel">
      <h4>Members</h4>
      <div id="members-list"></div>
    </div>

  </div>
</div>


<div class="modal-overlay" id="group-modal">
  <div class="modal">
    <h3>Create Group</h3>
    <div class="form-group" style="margin-bottom:14px;">
      <label>Group Name</label>
      <input type="text" id="group-name" placeholder="Enter group name" class="form-group input" style="background:var(--bg-input);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:10px 14px;color:var(--text-primary);font-size:15px;font-family:inherit;outline:none;width:100%;" />
    </div>
    <div class="form-group" style="margin-bottom:20px;">
      <label>Add Members</label>
      <div id="member-checkboxes" style="display:flex;flex-direction:column;gap:8px;margin-top:8px;max-height:200px;overflow-y:auto;"></div>
    </div>
    <div style="display:flex;gap:10px;">
      <button class="auth-btn" style="flex:1;" onclick="createGroup()">Create Group</button>
      <button class="auth-btn" style="flex:1;background:var(--bg-tertiary);" onclick="closeGroupModal()">Cancel</button>
    </div>
  </div>
</div>


<div class="toast" id="toast"></div>


<script src="/socket.io/socket.io.js"></script>
<script src="js/main.js"></script>
</body>
</html>
